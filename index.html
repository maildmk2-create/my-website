<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blox Fruit Script</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #05070d;
    color: white;
    text-align: center;
}

.topbar {
    display: flex;
    justify-content: space-between;
    padding: 12px 20px;
    background: black;
}

.center {
    height: 85vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* Buttons */
.btn {
    padding: 14px 30px;
    font-size: 16px;
    margin: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.sub { background: red; color: white; }
.like { background: #1877f2; color: white; }
.unlock { background: orange; color: black; display: none; }

.done {
    background: #22c55e !important;
    color: white;
    box-shadow: 0 0 10px #22c55e;
}

.disabled {
    opacity: 0.6;
    cursor: not-allowed;
}
</style>
</head>

<body>

<div class="topbar">
    <div>Sw_Walker</div>
</div>

<div class="center">

    <h2>Subscribe & Unlock Script</h2>

    <!-- Subscribe -->
    <button id="subBtn" class="btn sub" onclick="subscribe()">
        Subscribe on this channel
    </button>

    <!-- Like -->
    <button id="likeBtn" class="btn like" onclick="like()">
        Like this video
    </button>

    <!-- Unlock -->
    <button id="unlockBtn" class="btn unlock" onclick="unlock()">
        Unlock Link
    </button>

</div>

<script>
let subDone = false;
let likeDone = false;

function startTimer(btn, originalText, callback) {
    let time = 20;
    btn.disabled = true;
    btn.classList.add("disabled");

    let interval = setInterval(() => {
        btn.innerText = originalText + " (" + time + "s)";
        time--;

        if(time < 0){
            clearInterval(interval);
            callback(btn);
        }
    }, 1000);
}

function subscribe() {
    window.open("https://www.youtube.com/@Sw_Walker", "_blank");

    startTimer(document.getElementById("subBtn"), "Subscribe on this channel", (btn) => {
        btn.classList.add("done");
        btn.innerText = "Subscribed ✓";
        subDone = true;
        checkUnlock();
    });
}

function like() {
    window.open("https://www.youtube.com/watch?v=YOURVIDEO", "_blank");

    startTimer(document.getElementById("likeBtn"), "Like this video", (btn) => {
        btn.classList.add("done");
        btn.innerText = "Liked ✓";
        likeDone = true;
        checkUnlock();
    });
}

function checkUnlock() {
    if(subDone && likeDone){
        document.getElementById("unlockBtn").style.display = "inline-block";
    }
}

function unlock() {
    window.location.href = "https://link-hub.net/5124333/jCSVQu1z1sDW";
}
</script>

</body>
</html>
