<!DOCTYPE html>
<html>
<head>
<title>Script</title>

<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-W77004YKPQ');

<style>
body{
    background:#05070d;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:50px;
}

.box{
    background:#0b0f18;
    padding:25px;
    border-radius:15px;
    max-width:700px;
    margin:auto;
}

textarea{
    width:100%;
    height:180px;
    border-radius:10px;
    border:none;
    padding:10px;
    background:#111827;
    color:#8be9f7;
}

button{
    padding:12px 25px;
    margin-top:15px;
    background:#2ec5d3;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
    <h2>Copy Your Script</h2>

    <textarea id="code" readonly>
loadstring(game:HttpGet("YOUR SCRIPT HERE"))()
    </textarea>

    <br>

    <button onclick="copyScript()">Copy Script</button>

    <div id="msg"></div>
</div>

<script>
function copyScript(){
    let text = document.getElementById("code").value;
    navigator.clipboard.writeText(text);
    document.getElementById("msg").innerText = "Copied!";
}
</script>

</body>
</html>
