<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Script Page</title>

<style>
body{
    background:#05070d;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:50px;
}

.box{
    background:#0b0f18;
    padding:25px;
    border-radius:15px;
    max-width:700px;
    margin:auto;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

textarea{
    width:100%;
    height:180px;
    border-radius:10px;
    border:none;
    padding:10px;
    background:#111827;
    color:#8be9f7;
    resize:none;
    outline:none;
}

button{
    padding:12px 25px;
    margin-top:15px;
    background:#2ec5d3;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1aa6b3;
}

#msg{
    margin-top:10px;
    color:#8be9f7;
    font-size:14px;
}
</style>

</head>

<body>

<div class="box">
    <h2>Copy Your Script</h2>

    <textarea id="code" readonly>
loadstring(game:HttpGet("YOUR SCRIPT HERE"))()
    </textarea>

    <br>

    <button onclick="copyScript()">Copy Script</button>

    <div id="msg"></div>
</div>

<script>
function copyScript(){
    let text = document.getElementById("code").value;

    navigator.clipboard.writeText(text).then(() => {
        document.getElementById("msg").innerText = "✅ Script copied successfully!";
    }).catch(() => {
        document.getElementById("msg").innerText = "❌ Failed to copy script!";
    });
}
</script>

</body>
</html>
